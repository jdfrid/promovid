services:
  - type: web
    name: promovid
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    preDeployCommand: npm --workspace @promovid/api run db:deploy && npm --workspace @promovid/api run db:seed
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: promovid-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: promovid-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: LOCAL_STORAGE_PATH
        value: /app/uploads

  - type: worker
    name: promovid-worker
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: npm --workspace @promovid/api run start:worker
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: promovid-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: promovid-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: LOCAL_STORAGE_PATH
        value: /app/uploads

  - type: redis
    name: promovid-redis
    plan: starter
    ipAllowList: []

databases:
  - name: promovid-postgres
    plan: basic-256mb
    diskSizeGB: 15
