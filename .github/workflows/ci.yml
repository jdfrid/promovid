name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: promovid
          POSTGRES_PASSWORD: promovid
          POSTGRES_DB: promovid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U promovid -d promovid"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://promovid:promovid@localhost:5432/promovid?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run db:generate
      - run: npm run typecheck
      - run: npm run build
